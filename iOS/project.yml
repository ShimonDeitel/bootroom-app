name: Bootroom
options:
  bundleIdPrefix: com.shimondeitel.bootroom
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Bootroom:
    type: application
    platform: iOS
    sources:
      - path: Bootroom
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.bootroom
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Bootroom/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  BootroomTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: BootroomTests
      - path: Bootroom.storekit
    dependencies:
      - target: Bootroom
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.bootroom.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  BootroomUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: BootroomUITests
    dependencies:
      - target: Bootroom
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.bootroom.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Bootroom:
    build:
      targets:
        Bootroom: all
        BootroomTests: [test]
        BootroomUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Bootroom.storekit
    test:
      config: Debug
      storeKitConfiguration: Bootroom.storekit
      targets:
        - BootroomTests
        - BootroomUITests
    archive:
      config: Release
